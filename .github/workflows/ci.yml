name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_sqlite
          coverage: none
      - uses: ramsey/composer-install@v3
        with:
          working-directory: backend
      - run: composer validate --strict
      - run: php artisan test
      - run: vendor/bin/pint --test
      - run: vendor/bin/phpstan analyse --memory-limit=1G
      - run: composer audit
      - name: Verify generated API documentation
        run: |
          cp .env.example .env
          php artisan key:generate
          touch database/database.sqlite
          php artisan migrate --seed --force
          php artisan scribe:generate
          git diff --exit-code -- public/docs

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: corepack enable
      - run: corepack prepare pnpm@11.13.0 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build

  e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend, docker]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: corepack enable
      - run: corepack prepare pnpm@11.13.0 --activate
      - run: pnpm --dir frontend install --frozen-lockfile
      - run: pnpm --dir frontend exec playwright install --with-deps chromium
      - run: docker compose up --build -d --wait
      - run: pnpm --dir frontend test:e2e
      - name: Capture container logs
        if: failure()
        run: docker compose logs --no-color > compose.log
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-failure-artifacts
          path: |
            frontend/playwright-report
            frontend/test-results
            compose.log
      - if: always()
        run: docker compose down -v
